# Default configuration for Super Resolution training
seed: 1337

task:
  mode: "sr"          # "sr" or "mae"
  scale: 4            # default assumption; override per dataset (e.g., OLI2MSI ~3, SEN2VENµS 2 or 4)
  in_channels: 4      # e.g., RGBN = 4; Sentinel-2 subgroup often 4 at a time (SEN2VENµS)
  out_channels: 4

model:
  dim: 96
  depth: 8
  num_heads: 6
  window_size: 8
  mlp_ratio: 4.0
  dropout: 0.0

train:
  epochs: 200
  batch_size: 16
  lr: 2.0e-4
  weight_decay: 0.02
  warmup_steps: 2000
  grad_clip_norm: 1.0
  amp: true
  log_every: 50
  save_every: 1

loss:
  l1: 1.0
  charbonnier: 0.0
  sam: 0.05
  ergas: 0.0

data:
  dataset: "sen2venus"     # "sen2venus" | "oli2msi" | "probav" | "paired_folder"
  root: "/data/SEN2VENUS"  # change me
  split: "train"
  patch_size_lr: 128
  random_crop: true
  random_flip: true
  random_rot90: true
  num_workers: 8

dist:
  enabled: true
  backend: "nccl"
